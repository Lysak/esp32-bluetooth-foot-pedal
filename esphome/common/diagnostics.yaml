button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

sensor:
  - platform: uptime
    name: "Uptime"
    id: pedal_uptime_seconds
    entity_category: diagnostic
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    id: pedal_wifi_rssi
    entity_category: diagnostic
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic

  - platform: template
    name: "Current Binding"
    lambda: |-
      return {id(foot_pedal_hid).get_default_key_name()};
    update_interval: 60s
